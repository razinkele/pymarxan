name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,shiny]"
      # Both layers — matches `make types`. Phase 20 extended mypy
      # coverage to src/pymarxan_shiny/ and the Makefile reflects that;
      # CI must too or the layer drifts type-unsafe between releases.
      - run: mypy src/pymarxan/ src/pymarxan_shiny/ --ignore-missing-imports

  test:
    needs: [lint, types]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[all]"
      # `-m "not bench"` skips perf-budget benchmarks (sized for the dev
      # machine; could fail on slower CI runners). Run manually via
      # `make bench` against the canonical environment.
      - run: pytest tests/ -v -m "not bench" --cov --cov-report=term-missing --cov-fail-under=75
